<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dizidil - Learn Turkish</title>
    <script>
        window.addEventListener('error', function(e) {
            document.body.innerHTML += '<div style="position:fixed; top:0; left:0; right:0; background:red; color:white; z-index:9999; padding:20px; font-size:14px; word-wrap:break-word;">' + 
                '<strong>JS Error:</strong> ' + e.message + '<br>' + e.filename + ':' + e.lineno + 
                '<br><pre>' + (e.error && e.error.stack ? e.error.stack : '') + '</pre>' +
                '</div>';
        });
        window.addEventListener('unhandledrejection', function(e) {
            document.body.innerHTML += '<div style="position:fixed; top:0; left:0; right:0; background:orange; color:white; z-index:9999; padding:20px; font-size:14px; word-wrap:break-word;">' + 
                '<strong>Unhandled Promise Rejection:</strong> ' + e.reason +
                '</div>';
        });
    </script>
    <link rel="stylesheet" href="styles.css?v=15">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div id="app-container">
        <!-- Screens will be injected here by js/app.js -->
        <main id="screen-container"></main>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav">
            <button class="nav-btn" data-target="profile">
                <i data-lucide="user"></i>
                <span>Profil</span>
            </button>
            <button class="nav-btn active" data-target="home">
                <i data-lucide="home"></i>
                <span>Ana Sayfa</span>
            </button>
            <button class="nav-btn" data-target="progress">
                <i data-lucide="bar-chart-2"></i>
                <span>İlerleme</span>
            </button>
            <button class="nav-btn" data-target="idioms">
                <i data-lucide="book-open"></i>
                <span>Deyimler</span>
            </button>
        </nav>
    </div>

    <!-- Application Logic as ES Module -->
    <script type="module" src="js/app.js?v=15"></script>
</body>
</html>
